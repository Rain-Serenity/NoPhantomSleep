# ============================================
# NoPhantomSleep 插件主配置文件
# ============================================

# 是否启用本插件
# true  - 插件正常工作，玩家上床时重置休息统计
# false - 插件完全关闭，不执行任何操作
enabled: true

# 是否启用排除玩家列表（player.yml）
# true  - 列表中的玩家不受插件影响（上床不会重置休息统计）
# false - 所有玩家都会受到插件影响
exclude-player-list-enabled: false

# 执行 /nps 命令的冷却时间（单位：分钟）
# 玩家每次使用 /nps 后需要等待此时间才能再次使用
# 默认: 30 分钟
command-cooldown-minutes: 30

# 可绕过冷却的权限节点
# 拥有此权限的玩家使用 /nps 命令时不受冷却时间限制
# 默认: nophantomsleep.bypasscooldown
cooldown-bypass-permission: nophantomsleep.bypasscooldown
name: NoPhantomSleep
version: '${version}'
main: com.rserene.chosen.server.nophantomsleep.NoPhantomSleep
api-version: 26.1.2
website: https://www.RSerene.com/
authors: [Chosen_1st]

# ============================================
# 命令定义
# ============================================
commands:
  nps:
    description: NoPhantomSleep 插件管理命令
    usage: |
      /nps add <玩家名> - 将玩家添加到排除列表
      /nps remove <玩家名> - 将玩家从排除列表移除
      /nps reload - 重新加载配置文件
    aliases: [nophantomsleep]
    permission: nophantomsleep.admin

# ============================================
# 权限定义
# ============================================
permissions:
  nophantomsleep.admin:
    description: 允许使用 /nps 管理命令
    default: op
  nophantomsleep.bypasscooldown:
    description: 使用 /nps 命令时绕过冷却时间限制
    default: op